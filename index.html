<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje a Burgos | Verano 2026</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Ocultar barra de scroll para un look más limpio en los menús horizontales */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS COMPONENTES ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconMap = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconUtensils = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconCar = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>;
        const IconWalk = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m13 14 1 7"/><path d="M13 14v-4l-3-1-1 4"/><path d="M10 9 7 5l-2 1"/><path d="M14 6 12 3l-2 1"/><circle cx="14" cy="3" r="1"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('inicio');

            const navItems = [
                { id: 'inicio', label: 'Inicio', icon: IconHome },
                { id: 'visitas', label: 'Qué Ver', icon: IconMap },
                { id: 'provincia', label: 'Provincia', icon: IconCar },
                { id: 'agenda', label: 'Agenda', icon: IconCalendar },
                { id: 'comer', label: 'Comer', icon: IconUtensils },
                { id: 'info', label: 'Info Útil', icon: IconInfo },
            ];

            return (
                <div className="min-h-screen pb-20 bg-slate-50 text-slate-800">
                    
                    {/* Header y Portada: Tipografía elegante sin fotos */}
                    <div className="bg-slate-800 pt-16 pb-16 px-4 text-center flex flex-col items-center border-b-[6px] border-amber-600 shadow-md">
                        <div className="bg-slate-700 w-16 h-16 rounded-full mb-6 border border-slate-600 text-amber-400 shadow-inner flex items-center justify-center">
                            <div className="scale-[1.5]">
                                <IconMapPin />
                            </div>
                        </div>
                        <h1 className="text-4xl md:text-6xl font-serif font-bold text-white mb-6 shadow-sm tracking-wide">
                            Destino: Burgos
                        </h1>
                        <div className="w-24 h-1 bg-amber-500 mb-6 rounded-full"></div>
                        <p className="text-xl md:text-2xl text-slate-300 font-light tracking-wider">
                            31 Julio - <span className="text-amber-400 font-medium">6 Agosto 2026</span>
                        </p>
                    </div>

                    {/* Main Content Area */}
                    <main className="max-w-4xl mx-auto p-4 md:p-6 mt-2 tab-content">
                        {activeTab === 'inicio' && <TabInicio />}
                        {activeTab === 'visitas' && <TabVisitas />}
                        {activeTab === 'provincia' && <TabProvincia />}
                        {activeTab === 'agenda' && <TabAgenda />}
                        {activeTab === 'comer' && <TabComer />}
                        {activeTab === 'info' && <TabInfo />}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
                        <div className="max-w-4xl mx-auto flex justify-between overflow-x-auto no-scrollbar">
                            {navItems.map(item => {
                                const Icon = item.icon;
                                const isActive = activeTab === item.id;
                                return (
                                    <button 
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`flex-1 min-w-[70px] flex flex-col items-center py-3 px-1 transition-colors ${isActive ? 'text-amber-700' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <Icon />
                                        <span className={`text-[10px] md:text-xs mt-1 ${isActive ? 'font-bold' : 'font-medium'}`}>{item.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </nav>
                </div>
            );
        };

        // --- TABS COMPONENTES ---

        const TabInicio = () => (
            <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-l-4 border-l-amber-600">
                    <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">¡Bienvenidos a Burgos!</h2>
                    <p className="text-lg text-slate-600 mb-4 leading-relaxed">
                        Un viaje pensado para disfrutar con calma, comer de maravilla y empaparse de la historia de Castilla sin prisas y sin grandes esfuerzos físicos.
                    </p>
                    <div className="bg-amber-50 p-4 rounded-lg flex items-start gap-3">
                        <IconMapPin className="text-amber-700 mt-1 flex-shrink-0" />
                        <div>
                            <h3 className="font-bold text-amber-900">Vuestra Casa</h3>
                            <p className="text-amber-800 font-medium">Calle San Juan, 9, 09003 Burgos</p>
                            <p className="text-sm text-amber-700 mt-1">
                                <strong>Ubicación perfecta:</strong> Estáis en pleno centro histórico y peatonal. Nada más salir a la calle tendréis a un paso la Plaza de San Juan, el Monasterio de San Lesmes y calles llenas de vida. Podréis dar paseos de 5-10 minutos, sentaros a tomar un café y volver a casa sin apenas esfuerzo.
                            </p>
                            <a href="https://www.google.com/maps/search/?api=1&query=Calle+San+Juan+9+Burgos" target="_blank" className="inline-block mt-3 px-4 py-2 bg-amber-600 text-white text-sm rounded-lg hover:bg-amber-700 transition">Ver en Mapa</a>
                        </div>
                    </div>
                </div>

                {/* HISTORIA AMPLIADA */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="bg-slate-800 px-6 py-4 flex items-center gap-3 text-white">
                        <IconBook />
                        <h3 className="text-xl font-serif font-bold">Historia y Alma de Burgos</h3>
                    </div>
                    
                    <div className="p-6 space-y-6">
                        
                        <div className="border-b border-slate-100 pb-5">
                            <h4 className="text-lg font-bold text-slate-800 mb-2 text-amber-700">1. Los Orígenes y la Cabeza de Castilla (Siglos IX - XII)</h4>
                            <p className="text-slate-700 leading-relaxed mb-2 text-sm">
                                Burgos no nació como un pueblo, sino como un <strong>castillo fronterizo</strong>. Fue fundada en el año 884 por el conde Diego Porcelos, por orden del rey Alfonso III. Su misión era frenar el avance de los musulmanes hacia el norte y consolidar el valle del río Arlanzón. 
                            </p>
                            <p className="text-slate-700 leading-relaxed text-sm">
                                Rápidamente, su posición estratégica la hizo crecer exponencialmente. Se convirtió en la ciudad más importante de la región, ganándose el título de <em>"Caput Castellae"</em> (Cabeza de Castilla). De esta época destaca su habitante más legendario: <strong>Rodrigo Díaz de Vivar, el Cid Campeador</strong> (n. 1048), el caballero medieval por excelencia cuyas hazañas en la Reconquista cruzaron las fronteras de la historia y el mito.
                            </p>
                        </div>

                        <div className="border-b border-slate-100 pb-5">
                            <h4 className="text-lg font-bold text-slate-800 mb-2 text-amber-700">2. El Motor de Europa: El Consulado del Mar y el Camino de Santiago</h4>
                            <p className="text-slate-700 leading-relaxed mb-2 text-sm">
                                Si Burgos tiene hoy monumentos góticos tan espectaculares no es por casualidad, es por el dinero. Durante los siglos XV y XVI, Burgos monopolizó la exportación de <strong>la lana de oveja merina</strong> de toda Castilla hacia los telares de Flandes (actual Bélgica/Países Bajos). Los mercaderes burgaleses crearon el <em>Consulado del Mar</em> en 1494, manejando fortunas colosales.
                            </p>
                            <p className="text-slate-700 leading-relaxed text-sm">
                                Ese dinero atrajo a los mejores arquitectos de Europa (la familia Colonia, Gil de Siloé, Felipe Bigarny), que llenaron la ciudad de palacios, capillas y retablos impresionantes, dando lugar al conocido como <strong>"Gótico Isabelino"</strong>. A la vez, el flujo constante de peregrinos europeos por el <strong>Camino de Santiago</strong> aportaba ideas y cultura, haciendo de Burgos una ciudad cosmopolita en plena Edad Media.
                            </p>
                        </div>

                        <div className="border-b border-slate-100 pb-5">
                            <h4 className="text-lg font-bold text-slate-800 mb-2 text-amber-700">3. De la Decadencia a la Era Moderna</h4>
                            <p className="text-slate-700 leading-relaxed mb-2 text-sm">
                                El traslado de los puertos a Sevilla (por América) y la crisis del siglo XVII mermaron la economía burgalesa. Más tarde, durante la <strong>Guerra de la Independencia</strong> (1808-1813), la ciudad sufrió enormemente. Las tropas de Napoleón se atrincheraron en el antiguo castillo de Burgos y, al huir, lo volaron por los aires, destruyendo buena parte del patrimonio e incluso dañando las vidrieras de la Catedral.
                            </p>
                            <p className="text-slate-700 leading-relaxed text-sm">
                                En los siglos XIX y XX, Burgos resurgió. La burguesía construyó paseos elegantes como el Espolón y la ciudad se modernizó, convirtiéndose más tarde en un importante Polo de Desarrollo Industrial (automoción, alimentación).
                            </p>
                        </div>

                        <div className="bg-sky-50 rounded-lg p-5 border border-sky-100">
                            <h4 className="text-lg font-bold text-sky-900 mb-2 flex items-center gap-2">
                                <IconMap /> Geografía y Clima
                            </h4>
                            <p className="text-slate-700 leading-relaxed mb-2 text-sm">
                                Burgos se asienta en la Meseta Norte, a una altitud de <strong>856 metros sobre el nivel del mar</strong>. Su eje vital es el tranquilo <strong>río Arlanzón</strong>, que cruza la ciudad de este a oeste, dejando a un lado el casco histórico y la Catedral, y al otro la parte más moderna. Está rodeada por páramos y campiñas.
                            </p>
                            <p className="text-slate-700 leading-relaxed text-sm">
                                <strong>El Clima en Agosto (¡Cuidado!):</strong> Burgos tiene un clima mediterráneo continentalizado muy particular. Su alta altitud hace que las temperaturas oscilen brutalmente en un mismo día. En agosto podéis estar a 30°C comiendo en manga corta, pero <strong>en cuanto el sol se esconde o pega la sombra, la temperatura se desploma hasta los 10°C - 12°C</strong>. El refrán dice: <em>"En Burgos hay dos estaciones: el invierno y la estación de tren"</em>. Llevar una buena chaqueta fina, rebeca o cortavientos es absolutamente imprescindible para salir a pasear o cenar por la noche.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TabVisitas = () => (
            <div className="space-y-6">
                <p className="text-lg text-slate-600 font-medium mb-4">Las 10 joyas de la capital. Hemos priorizado la accesibilidad para no caminar demasiado.</p>
                
                {/* Tren Turístico Tip */}
                <div className="bg-blue-50 rounded-xl p-5 border border-blue-100 shadow-sm flex gap-4 items-start">
                    <div className="bg-blue-100 p-2 rounded-full text-blue-700 flex-shrink-0">
                        <IconInfo />
                    </div>
                    <div>
                        <h4 className="font-bold text-blue-900 text-lg">💡 Recomendación Estrella: El Chu-Chú (Tren Turístico)</h4>
                        <p className="text-blue-800 mt-1">Para evitar caminar, os recomiendo coger el tren turístico que sale de la Plaza del Rey San Fernando (junto a la Catedral). Hace un recorrido por el centro histórico y <strong>sube al Castillo</strong>, que andando sería una cuesta tremenda. Perfecto para verlo todo cómodamente sentados.</p>
                    </div>
                </div>

                <PlaceCard 
                    title="1. Santa Iglesia Catedral (Patrimonio de la Humanidad)"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Catedral_de_Burgos_-_03.jpg/800px-Catedral_de_Burgos_-_03.jpg"
                    history="Construida en el siglo XIII (1221), joya cumbre del gótico español. Alberga maravillas como la Escalera Dorada de Diego de Siloé, la tumba del Cid y Doña Jimena, la asombrosa Capilla de los Condestables y el famoso autómata 'Papamoscas'."
                    accessibility="A 5 mins andando desde casa. El acceso principal está adaptado y el interior es llano. Hay bancos en las capillas laterales para sentarse a contemplar."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Catedral+de+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Catedral_de_Burgos"
                    iconMode={<IconWalk/>}
                />

                <PlaceCard 
                    title="2. Monasterio de Santa María la Real de las Huelgas"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Monasterio_de_las_Huelgas_Reales_%28Burgos%29_-_Claustro_de_San_Fernando_2.jpg/800px-Monasterio_de_las_Huelgas_Reales_%28Burgos%29_-_Claustro_de_San_Fernando_2.jpg"
                    history="Fundado en 1187 por el rey Alfonso VIII. Era un panteón real y un monasterio de mujeres de la realeza con muchísimo poder. Conserva impresionantes sepulcros medievales y tapices."
                    accessibility="A 10 min en COCHE desde casa. Podéis aparcar cerca de la entrada. La visita es guiada pero el recorrido es casi todo en la misma planta y muy tranquilo."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Monasterio+de+las+Huelgas+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Monasterio_de_Santa_Mar%C3%ADa_la_Real_de_Las_Huelgas"
                    iconMode={<IconCar/>}
                />

                <PlaceCard 
                    title="3. Cartuja de Miraflores"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Cartuja_de_Miraflores_%28Burgos%29.jpg/800px-Cartuja_de_Miraflores_%28Burgos%29.jpg"
                    history="Ubicada en un bosque a las afueras, fue panteón de los padres de Isabel la Católica (Juan II e Isabel de Portugal). El retablo mayor de Gil de Siloé es una obra cumbre, dorado con el primer oro de América."
                    accessibility="A 15 min en COCHE. Tiene aparcamiento en la misma puerta. Visita cortita y totalmente llana en su nave central, ideal para no cansarse."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Cartuja+de+Miraflores+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Cartuja_de_Miraflores"
                    iconMode={<IconCar/>}
                />

                <PlaceCard 
                    title="4. Museo de la Evolución Humana (MEH)"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Burgos_-_Museo_de_la_Evoluci%C3%B3n_Humana_01.jpg/800px-Burgos_-_Museo_de_la_Evoluci%C3%B3n_Humana_01.jpg"
                    history="Edificio moderno que alberga los fósiles originales de Atapuerca, incluyendo a 'Miguelón' y los restos de los europeos más antiguos. Un viaje imprescindible al origen de la humanidad."
                    accessibility="A 5-10 min andando, todo llano. El edificio es 100% accesible (premios de accesibilidad), lleno de rampas amplias, ascensores y multitud de bancos para descansar."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Museo+de+la+Evolucion+Humana+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Museo_de_la_Evoluci%C3%B3n_Humana"
                    iconMode={<IconWalk/>}
                />
                
                <PlaceCard 
                    title="5. Paseo del Espolón y Arco de Santa María"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Paseo_del_Espol%C3%B3n_%28Burgos%29_02.jpg/800px-Paseo_del_Espol%C3%B3n_%28Burgos%29_02.jpg"
                    history="El Espolón es el paseo burgués paralelo al río, creado en el s.XVIII. Termina en el Arco de Santa María, antigua puerta de la muralla medieval remodelada como un gigantesco retablo de piedra en honor al emperador Carlos V."
                    accessibility="Totalmente llano y pavimentado. Lleno de sombra y bancos de hierro para sentarse a mirar a la gente pasar. El paseo perfecto y sin esfuerzo."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Paseo+del+Espolon+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Arco_de_Santa_Mar%C3%ADa"
                    iconMode={<IconWalk/>}
                />

                <PlaceCard 
                    title="6. Iglesia de San Nicolás de Bari"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Iglesia_de_San_Nicol%C3%A1s_de_Bari_%28Burgos%29_-_Retablo_Mayor_01.jpg/800px-Iglesia_de_San_Nicol%C3%A1s_de_Bari_%28Burgos%29_-_Retablo_Mayor_01.jpg"
                    history="Situada justo al lado de la Catedral. Por fuera es discreta, pero alberga en su interior uno de los retablos de piedra más asombrosos del mundo, tallado a finales del siglo XV por Simón de Colonia."
                    accessibility="A 6 mins andando, pegada a la Catedral. Es pequeña, por lo que se ve rápido sin apenas andar por su interior."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Iglesia+de+San+Nicolas+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Iglesia_de_San_Nicol%C3%A1s_de_Bari_(Burgos)"
                    iconMode={<IconWalk/>}
                />

                <PlaceCard 
                    title="7. Monasterio de San Juan y Museo Marceliano"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Monasterio_de_San_Juan_%28Burgos%29_-_Claustro_01.jpg/800px-Monasterio_de_San_Juan_%28Burgos%29_-_Claustro_01.jpg"
                    history="Antiguo monasterio en ruinas cuya iglesia fue cubierta recientemente con una espectacular techumbre de madera moderna. Albergó a peregrinos del Camino de Santiago."
                    accessibility="¡A 1 minuto literal de vuestra casa! Está en la misma Plaza de San Juan. Todo llano y con bancos dentro."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Monasterio+de+San+Juan+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Monasterio_de_San_Juan_(Burgos)"
                    iconMode={<IconWalk/>}
                />

                <PlaceCard 
                    title="8. Castillo de Burgos y Mirador"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Castillo_de_Burgos.jpg/800px-Castillo_de_Burgos.jpg"
                    history="Fortaleza original de la fundación de la ciudad (año 884). Fue volado por las tropas de Napoleón en su retirada en 1813. El pozo que conserva es una obra de ingeniería medieval fascinante."
                    accessibility="Andando es muy cuesta arriba. La mejor forma: subir en el Tren Turístico que hace parada allí, o subir con vuestro COCHE (hay un parking de tierra justo en la cima). Las vistas desde el mirador al atardecer son preciosas."
                    mapLink="https://www.google.com/maps/search/?api=1&query=Castillo+de+Burgos"
                    moreInfoLink="https://es.wikipedia.org/wiki/Castillo_de_Burgos"
                    iconMode={<IconCar/>}
                />

                <PlaceCard 
                    title="9. Plaza Mayor y Ayuntamiento"
                    image="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Plaza_Mayor_de_Burgos_01.jpg/800px-Plaza_Mayor_de_Burgos_01.jpg"
                    history="Antigua plaza de mercados menores, tiene forma hexagonal irregular. El Ayuntamiento fue construido en el s.XVIII y bajo sus soportales descansan las marcas de las peores riadas del río Arlanzón."
